# Ubuntu 上で実際に NONINTERACTIVE bootstrap を実行し、
# Linux セットアップが壊れていないことを検証する。
# macOS ローカルでは気づけない Linux 固有の破損（バージョン不足・
# PATH 問題・bashism 等）の安全網。
#
# セットアップ関連ファイルを変更した PR と手動トリガーで実行される。

name: Linux Bootstrap Test

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Makefile'
      - 'scripts/**'
      - 'Brewfiles/**'
      # デプロイ後の設定(zsh起動等)も検証しているため configs も対象
      - 'configs/**'
      - '.github/workflows/linux-bootstrap-test.yml'
  workflow_dispatch:

jobs:
  linux-bootstrap:
    name: Bootstrap on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run bootstrap (non-interactive, minimum mode)
        env:
          NONINTERACTIVE: "1"
          DOTFILES_BOOTSTRAP_MODE: minimum
          DOTFILES_GIT_USER_NAME: CI User
          DOTFILES_GIT_USER_EMAIL: ci@example.com
          DOTFILES_DEFAULT_SHELL: zsh
        run: make bootstrap

      - name: Verify installed tool versions
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

          fail=0
          check_min_version() {
            # $1: name, $2: actual (x.y.z), $3: required (x.y)
            if [ "$(printf '%s\n%s\n' "$3" "$2" | sort -V | head -n1)" = "$3" ]; then
              echo "OK: $1 $2 (>= $3)"
            else
              echo "NG: $1 $2 (< $3 required)"
              fail=1
            fi
          }

          nvim_ver=$(nvim --version | head -n1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          check_min_version neovim "$nvim_ver" 0.11

          fzf_ver=$(fzf --version | grep -oE '^[0-9]+\.[0-9]+')
          check_min_version fzf "$fzf_ver" 0.48

          tmux_ver=$(tmux -V | grep -oE '[0-9]+\.[0-9]+')
          check_min_version tmux "$tmux_ver" 3.2

          for cmd in zsh starship eza bat fd delta zoxide lazygit gh rg; do
            if command -v "$cmd" >/dev/null 2>&1; then
              echo "OK: $cmd found ($(command -v "$cmd"))"
            else
              echo "NG: $cmd not found"
              fail=1
            fi
          done

          exit $fail

      - name: Verify deployed configs
        run: |
          fail=0
          for f in ~/.zshrc ~/.tmux.conf ~/.gitconfig ~/.config/nvim/init.lua ~/.config/starship/starship.toml; do
            if [ -e "$f" ]; then
              echo "OK: $f deployed"
            else
              echo "NG: $f missing"
              fail=1
            fi
          done
          exit $fail

      - name: Verify zsh starts cleanly with deployed config
        run: |
          # 意図的に brew shellenv を通さず、非ログイン対話シェル相当
          # (PATH に brew なし + .zshrc のみ読み込み) で起動を検証する。
          # config-linux.zsh が brew PATH を確立し、starship が見つかる
          # ことのリグレッションテスト。
          # 注意: `zsh -ic 'exit 0'` は rc 内のエラーを検出できない
          # (明示的な exit 0 で必ず成功する) ため、starship の解決と
          # エラー出力の有無を明示的にアサートする。
          output=$(/home/linuxbrew/.linuxbrew/bin/zsh -ic 'command -v starship || exit 1' 2>&1) || {
            echo "$output"
            echo "NG: starship not reachable from a non-login interactive zsh"
            exit 1
          }
          echo "$output"
          if echo "$output" | grep -E 'command not found|not found'; then
            echo "NG: zshrc emitted errors during startup"
            exit 1
          fi
          echo "OK: non-login interactive zsh starts cleanly with brew PATH"

      - name: Verify fonts installed
        run: |
          # nerd-fonts は ~/.local/share/fonts/NerdFonts/ 配下に入るため
          # fc-list でフォント名を個別に検証する
          fail=0
          fc-list | grep -qi 'hack nerd' && echo "OK: Hack Nerd Font registered" || { echo "NG: Hack Nerd Font missing"; fail=1; }
          fc-list | grep -qi 'meslo' && echo "OK: Meslo Nerd Font registered" || { echo "NG: Meslo Nerd Font missing"; fail=1; }
          exit $fail
