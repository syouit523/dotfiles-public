# BATS テスト CI は個人用 dotfiles のため無効化中（下部のコメント参照）。
# shellcheck のみ PR 時に実行する。Linux でしか発現しない構文エラー
# （dash 非対応の bashism 等）をローカル macOS では検出できないため、
# 最低限の安全網として残している。

name: Lint

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck on all shell scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning \
            scripts/*.sh scripts/linux/*.sh mac/scripts/*.sh tests/run-tests.sh

